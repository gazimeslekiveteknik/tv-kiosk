<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gazi MTAL Bilgi Ekranı - Kurulum</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .setup-container {
            background: var(--card);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 500px;
            border: 1px solid var(--border);
        }

        .setup-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .setup-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.5px;
        }

        p.subtitle {
            margin: 8px 0 0 0;
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text);
        }

        input[type="text"], select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            box-sizing: border-box;
            background: #fdfdfd;
            transition: all 0.2s ease;
            color: var(--text);
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .info-text {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
            display: block;
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        .demo-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            margin-top: 12px;
        }

        .demo-btn:hover {
            background: #f1f5f9;
            color: var(--text);
        }
    </style>
</head>
<body>

    <div class="setup-container">
        <div class="setup-header">
            <div class="setup-icon">⚙️</div>
            <h1>Sistem Kurulumu</h1>
            <p class="subtitle">TV Kiosk ekranı için bağlantı ayarlarını yapılandırın</p>
        </div>
        
        <form id="setupForm">
            <div class="form-group">
                <label for="sheetId">Google Sheets ID (Tablo Kimliği)</label>
                <input type="text" id="sheetId" placeholder="Örn: 1A2B3C4D5E..." required>
                <span class="info-text">Google E-Tablolar URL'sindeki /d/ ile /edit arasındaki uzun metin.</span>
            </div>

            <div class="form-group">
                <label for="kategori">Varsayılan Kategori Tanımlaması</label>
                <select id="kategori" name="kategori">
                    <option value="duyuru">Duyuru</option>
                    <option value="onemli">Önemli</option>
                    <option value="sinav">Sınav Takvimi</option>
                    <option value="etkinlik">Etkinlik</option>
                    <option value="spor">Spor Haberi</option>
                    <option value="genelkultur">Genel Kültür</option>
                    <option value="yemek">Yemek Menüsü</option>
                    <option value="tebrik">Tebrikler</option>
                </select>
                <span class="info-text">Sisteme yeni bir içerik eklendiğinde varsayılan olarak atanacak kategoriyi seçin.</span>
            </div>

            <button type="submit">Kaydet ve Sistemi Başlat</button>
            <button type="button" class="demo-btn" id="demoBtn">Önizleme (Demo) Modunda Başlat</button>
        </form>
    </div>

    <script>
        // Sayfa yüklendiğinde mevcut ayarları form alanlarına doldur
        document.addEventListener('DOMContentLoaded', () => {
            const savedId = localStorage.getItem('kiosk_sheet_id');
            if (savedId) {
                document.getElementById('sheetId').value = savedId;
            }
        });

        // Formu Kaydetme İşlemi
        document.getElementById('setupForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const sheetId = document.getElementById('sheetId').value.trim();
            
            if (sheetId) {
                // Tablo ID'sini cihaza kaydet
                localStorage.setItem('kiosk_sheet_id', sheetId);
                // Demo modunu kapat
                localStorage.removeItem('kiosk_demo_mode');
                
                // Ana ekrana yönlendir
                window.location.href = 'index.html';
            }
        });

        // Demo Modu Butonu İşlemi
        document.getElementById('demoBtn').addEventListener('click', () => {
            localStorage.setItem('kiosk_demo_mode', 'true');
            window.location.href = 'index.html?demo=true';
        });
    </script>
</body>
</html>
