<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yönetim Paneli - Ders & Nöbet</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --card: rgba(255,255,255,0.05); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; padding: 40px; }
        .container { max-width: 800px; margin: 0 auto; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 12px 24px; background: var(--card); border: none; color: white; border-radius: 8px; cursor: pointer; }
        .tab-btn.active { background: var(--primary); }
        .form-section { background: var(--card); padding: 30px; border-radius: 16px; display: none; }
        .form-section.active { display: block; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: #94a3b8; }
        input, textarea, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: white; }
        .btn-save { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: 800; cursor: pointer; width: 100%; }
        .success { color: #10b981; text-align: center; margin-top: 15px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📺 Kiosk Yönetimi</h1>
        <div class="tabs">
            <button class="tab-btn" onclick="showTab('kurulum')">Kurulum</button>
            <button class="tab-btn active" onclick="showTab('nobet')">Nöbet & Ders</button>
        </div>

        <div id="kurulum" class="form-section">
            <div class="form-group"><label>Google Sheet ID</label><input type="text" id="sheet-id"></div>
            <button class="btn-save" onclick="saveConfig()">Bağlantıyı Kaydet</button>
        </div>

        <div id="nobet" class="form-section active">
            <form id="nobet-form">
                <div class="form-group">
                    <label>Ders Saatleri (Bloklar arası virgül, saatler arası tire: 08:30-09:50, 10:00-11:20)</label>
                    <textarea id="n-dersler" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Nöbetçi Öğretmenler (Kat: İsim şeklinde, virgülle ayırın: 1.Kat: Ali Veli, Zemin: Ayşe Y.)</label>
                    <textarea id="n-ogretmenler" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Nöbetçi Öğrenciler (Sınıf: İsim şeklinde, virgülle ayırın: 12-A: Mehmet S., 11-B: Elif K.)</label>
                    <textarea id="n-ogrenciler" rows="3"></textarea>
                </div>
                <button type="submit" class="btn-save">💾 Programı Güncelle</button>
                <div id="msg" class="success">✅ Başarıyla Tabloya Gönderildi!</div>
            </form>
        </div>
    </div>

    <script>
        function showTab(id) {
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
        }

        function saveConfig() {
            localStorage.setItem('kiosk_sheet_id', document.getElementById('sheet-id').value);
            alert("Bağlantı ID kaydedildi.");
        }

        document.getElementById('nobet-form').onsubmit = async (e) => {
            e.preventDefault();
            const sheetId = localStorage.getItem('kiosk_sheet_id');
            const scriptUrl = localStorage.getItem('kiosk_script_url'); // Daha önce kaydedilen Apps Script URL
            
            const payload = {
                action: 'saveSidebarData',
                sheetId: sheetId,
                sidebarData: {
                    dersler: document.getElementById('n-dersler').value,
                    ogretmenler: document.getElementById('n-ogretmenler').value,
                    ogrenciler: document.getElementById('n-ogrenciler').value
                }
            };

            const resp = await fetch(scriptUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload)
            });
            const res = await resp.json();
            if(res.status === 'success') {
                document.getElementById('msg').style.display = 'block';
                setTimeout(() => document.getElementById('msg').style.display = 'none', 3000);
            }
        };
    </script>
</body>
</html>
